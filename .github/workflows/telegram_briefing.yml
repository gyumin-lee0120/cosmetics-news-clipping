name: 텔레그램 아침 브리핑 발송

on:
  schedule:
    # 한국시간(KST, UTC+9) 월~금 오전 9시 정각 = UTC 00:00 (같은 날짜, 월~금)
    - cron: "13 0 * * 1-5"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼도 사용 가능

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 텔레그램 브리핑 발송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_telegram.py
