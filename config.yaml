# 소스별 설정. enabled: false 인 항목은 이번 1차 구현에서 아직 코드가 없고,
# config만 미리 잡아둔 상태입니다 (README의 로드맵 참고).
sources:
  naver_news:
    enabled: true
    display: 100      # 1회 호출당 최대 결과 수 (네이버 API 한도)
    max_pages: 2       # 키워드당 조회 페이지 수 (100건 x 2 = 최대 200건/키워드)
    sort: date

  bigkinds:
    enabled: false     # TODO: 다음 단계 — 빅카인즈 오픈API 연동

  cosmetics_trade_press_rss:
    enabled: false     # TODO: 다음 단계 — 코스인/코스모닝/CMN 등 RSS 확인 후 연동

  mfds_cosmetics_regulation:
    enabled: false     # TODO: 다음 단계 — 식약처 화장품 규제정보 공공데이터 API

  mfds_medical_device:
    enabled: false     # TODO: 다음 단계 — 식약처 의료기기 품목허가정보 API (홈뷰티 디바이스용)

  kipris_patents:
    enabled: false     # TODO: 다음 단계 — 특허청 키프리스 오픈API

  wipo_patentscope:
    enabled: false     # TODO: 다음 단계 — WIPO PatentScope RSS 알림

  overseas_media:
    enabled: false     # TODO: 다음 단계 — Global Cosmetics News, CosmeticsDesign 등 (RSS 제공 여부 확인 필요)

kosis_online_shopping:
    enabled: true      # 통계청 온라인쇼핑동향조사 - 화장품(objL1=010) 합계(objL2=00) 거래액(itmId=T20), tblId=DT_1KE10071
    months_back: 24

  customs_trade_stats:
    enabled: false     # TODO: 다음 단계 — 관세청 수출입통계 오픈API (HS Code 33류)

  mfds_production_stats:
    enabled: false     # TODO: 다음 단계 — 식약처 화장품 생산실적 통계 (연 1회 수동 갱신도 가능)

  exhibitions:
    enabled: true
    # 자동 수집 대신 수동으로 관리하는 전시회 일정 (data/exhibitions.json)

email:
  enabled: false       # 이메일까지 보내려면 true로 변경하고 GitHub secrets에 발신 계정 정보 등록
  to:
    - "TODO: 받는사람@example.com"
  send_hour_kst: 8
